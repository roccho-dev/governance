name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - proposals

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  adrs-connection:
    name: adrs connection preflight
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout governance
        uses: actions/checkout@v4

      - name: Validate ADRs reader configuration is present
        env:
          ADRS_READER_CLIENT_ID: ${{ vars['ADRS_READER_CLIENT_ID'] }}
          ADRS_READER_PRIVATE_KEY: ${{ secrets['ADRS_READER_PRIVATE_KEY'] }}
        run: |
          set -euo pipefail
          test -n "$ADRS_READER_CLIENT_ID" || { echo "missing Actions variable: ADRS_READER_CLIENT_ID" >&2; exit 1; }
          test -n "$ADRS_READER_PRIVATE_KEY" || { echo "missing Actions secret: ADRS_READER_PRIVATE_KEY" >&2; exit 1; }

      - name: Create ADRs reader token
        id: adrs-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars['ADRS_READER_CLIENT_ID'] }}
          private-key: ${{ secrets['ADRS_READER_PRIVATE_KEY'] }}
          owner: roccho-dev
          repositories: adrs
          permission-contents: read

      - name: Checkout ADRS from GitHub
        uses: actions/checkout@v4
        with:
          repository: roccho-dev/adrs
          ref: proposals
          path: .ci/adrs
          token: ${{ steps.adrs-token.outputs.token }}
          persist-credentials: false

      - name: Verify ADRS checkout
        run: |
          set -euo pipefail
          test -d .ci/adrs
          git -C .ci/adrs rev-parse HEAD
          test -f .ci/adrs/flake.nix || test -d .ci/adrs/records || test -d .ci/adrs/docs

  nix:
    name: nix flake contract
    runs-on: ubuntu-latest
    needs: adrs-connection
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      ADRS_INPUT: path:./.ci/adrs
    steps:
      - name: Checkout governance
        uses: actions/checkout@v4

      - name: Validate ADRs reader configuration is present
        env:
          ADRS_READER_CLIENT_ID: ${{ vars['ADRS_READER_CLIENT_ID'] }}
          ADRS_READER_PRIVATE_KEY: ${{ secrets['ADRS_READER_PRIVATE_KEY'] }}
        run: |
          set -euo pipefail
          test -n "$ADRS_READER_CLIENT_ID" || { echo "missing Actions variable: ADRS_READER_CLIENT_ID" >&2; exit 1; }
          test -n "$ADRS_READER_PRIVATE_KEY" || { echo "missing Actions secret: ADRS_READER_PRIVATE_KEY" >&2; exit 1; }

      - name: Create ADRs reader token
        id: adrs-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars['ADRS_READER_CLIENT_ID'] }}
          private-key: ${{ secrets['ADRS_READER_PRIVATE_KEY'] }}
          owner: roccho-dev
          repositories: adrs
          permission-contents: read

      - name: Checkout ADRS from GitHub
        uses: actions/checkout@v4
        with:
          repository: roccho-dev/adrs
          ref: proposals
          path: .ci/adrs
          token: ${{ steps.adrs-token.outputs.token }}
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Verify Nix
        run: nix --version

      - name: Prepare CUE contract inputs
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/cue-real" "$RUNNER_TEMP/cue-fixture"
          cp .ci/adrs/adr/schema.cue "$RUNNER_TEMP/cue-real/schema.cue"
          cp .ci/adrs/adr/src/01JYJ5Q0ABCDE123456789ABCD-external-nix-package-build-contract.cue "$RUNNER_TEMP/cue-real/contract.cue"
          cp checks/external-package-build-contract.cue "$RUNNER_TEMP/cue-real/consumer.cue"
          cp fixtures/adrs/external-package-build-contract/adr/schema.cue "$RUNNER_TEMP/cue-fixture/schema.cue"
          cp fixtures/adrs/external-package-build-contract/adr/src/contract.cue "$RUNNER_TEMP/cue-fixture/contract.cue"
          cp checks/external-package-build-contract.cue "$RUNNER_TEMP/cue-fixture/consumer.cue"

      - name: Check CUE tool
        run: nix shell github:NixOS/nixpkgs/nixos-unstable#cue -c cue version

      - name: Check real external package contract
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/cue-real"
          nix shell github:NixOS/nixpkgs/nixos-unstable#cue -c cue vet schema.cue contract.cue consumer.cue

      - name: Check fixture external package contract
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/cue-fixture"
          nix shell github:NixOS/nixpkgs/nixos-unstable#cue -c cue vet schema.cue contract.cue consumer.cue

      - name: Check purpose readback gate
        run: python3 tools/check-purpose-readback.py selftest

      - name: Check package governance selftests
        run: |
          set -euo pipefail
          for script in tools/check-package-*.py tools/build-package-*.py; do
            [ -e "$script" ] || continue
            python3 "$script" selftest
          done

      - name: Show flake surface
        run: nix flake show --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT"

      - name: Run flake check
        run: nix flake check --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT"

      - name: Run default help
        run: nix run --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .

      - name: Run named help
        run: nix run --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#help

      - name: Build explicit bootstrap package
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#bootstrap-input

      - name: Build README artifact package
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#readme-artifact

      - name: Check README artifact package
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.readme-artifact

      - name: Check ADR input presence
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.adrs-input-presence

      - name: Check ADRS shadow monitor selftest
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.adrs-shadow-monitor-selftest

      - name: Check no local records
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.no-local-governance-records

      - name: Check Nix default surface
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.nix-default-surface

      - name: Check provider CI YAML selftest
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.provider-ci-yaml-selftest
