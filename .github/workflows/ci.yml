name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: governance-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: nix flake contract
    runs-on: [self-hosted, linux, nix]
    env:
      NIX_CONFIG: extra-experimental-features = nix-command flakes
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Nix
        run: nix --version

      - name: Show flake surface
        run: nix flake show --show-trace

      - name: Run default help
        run: nix run . --show-trace

      - name: Run named help
        run: nix run .#help --show-trace

      - name: Build explicit bootstrap package
        run: nix build .#bootstrap-input --show-trace

      - name: Check flake
        run: nix flake check --show-trace
