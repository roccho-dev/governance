name: repo-explain-artifact-minimal

on:
  pull_request:
  push:
    branches: [proposals]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build artifact with projector
        run: |
          set -euo pipefail
          mkdir -p artifact
          bash tools/repo-explain-artifact.sh build \
            --input fixtures/repo-explain-artifact/accepted.jsonl \
            --repo roccho-dev/governance \
            --required-root purpose:company:high-value-sale \
            --audience public \
            --out artifact
          echo projector > artifact/mode.txt
          test -s artifact/README.md
          test -s artifact/manifest.json
          test -s artifact/sources.jsonl
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-explain-projector
          path: artifact/
          if-no-files-found: error
