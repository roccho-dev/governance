name: repo-explain-artifact-minimal

on:
  pull_request:
  push:
    branches: [proposals]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Create artifact files
        run: |
          mkdir -p artifact
          echo '# governance' > artifact/README.md
          echo '{"kind":"manifest","nonAuthority":true}' > artifact/manifest.json
          echo '{"kind":"sources","nonAuthority":true}' > artifact/sources.jsonl
          echo '{"kind":"receipt","nonAuthority":true}' > artifact/receipt.json
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-explain-minimal
          path: artifact/
          if-no-files-found: error
