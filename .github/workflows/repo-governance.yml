name: repo-governance

on:
  pull_request:
    paths:
      - '.github/workflows/repo-governance.yml'
      - 'flake.nix'
      - 'nix/**'
      - 'governance/repo-governance*.json'
      - 'packages/repo-governance/**'
      - 'packages/repo-governance-cli/**'
      - 'e2e/repo-governance/**'
      - 'example/repo-governance/**'
      - 'example/feat-consumer/**'
      - 'proposals/repo-governance-**'
      - 'github/ruleset-plan.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repo-governance.yml'
      - 'flake.nix'
      - 'nix/**'
      - 'governance/repo-governance*.json'
      - 'packages/repo-governance/**'
      - 'packages/repo-governance-cli/**'
      - 'e2e/repo-governance/**'
      - 'example/repo-governance/**'
      - 'example/feat-consumer/**'
      - 'proposals/repo-governance-**'
      - 'github/ruleset-plan.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repo-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  proof:
    name: proof
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      ADRS_INPUT: path:./.ci/adrs
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONHASHSEED: '0'
      PYTHONPATH: packages/repo-governance/src:packages/repo-governance-cli/src
    steps:
      - name: Checkout governance
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Prepare local ADR input path
        run: mkdir -p .ci/adrs

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Compile packages
        run: >-
          python -m compileall -q
          packages/repo-governance/src
          packages/repo-governance-cli/src
          e2e/repo-governance/run.py

      - name: Run executable proof
        run: |
          python e2e/repo-governance/run.py \
            --receipt "$RUNNER_TEMP/repo-governance-proof-receipt.json"
          cat "$RUNNER_TEMP/repo-governance-proof-receipt.json"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Show flake surface
        run: nix flake show --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .

      - name: Build repo-governance package
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#repo-governance

      - name: Run repo-governance app
        run: >-
          nix run --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#repo-governance --
          --adr-bundle governance/repo-governance-bundle.json
          --repo-snapshot governance/repo-governance.json
          --output summary

      - name: Build repo-governance proof check
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.repo-governance-proof

      - name: Build repo-governance self check
        run: nix build --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#checks.x86_64-linux.repo-governance-self

      - name: Check feat consumer snapshot
        run: >-
          nix run --show-trace --no-write-lock-file --override-input adrsRecords "$ADRS_INPUT" .#repo-governance --
          --adr-bundle governance/repo-governance-bundle.json
          --repo-snapshot example/feat-consumer/governance/repo-governance.json
          --output summary

      - name: Verify proof does not mutate the checkout
        run: git diff --exit-code
