name: log route join

on:
  workflow_dispatch:
  pull_request:
    branches:
      - proposals
  push:
    branches:
      - proposals

permissions:
  contents: read

jobs:
  fixture:
    name: log route fixture join
    runs-on: ubuntu-latest
    steps:
      - name: Checkout governance
        uses: actions/checkout@v4
      - name: Check log route fixture join
        run: python3 tools/check-log-route-join-fixtures.py --fixtures fixtures/log-route-join/cases.jsonl
