name: README govlib contract

on:
  workflow_dispatch:
  push:
    branches:
      - proposals
  pull_request:

permissions:
  contents: read

jobs:
  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout governance
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-experimental-features = nix-command flakes

      - name: Run flake check
        run: nix flake check --show-trace --no-write-lock-file --override-input adrsRecords github:roccho-dev/adrs/proposals
